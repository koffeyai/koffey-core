name: Bug report
description: Report a reproducible defect in the app, setup flow, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please include a minimal reproduction.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste stack traces, terminal output, or screenshots if you have them.
      render: shell
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local Supabase + local frontend
        - Hosted Supabase + local frontend
        - Hosted Supabase + deployed frontend
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 20.19.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.3, Ubuntu 24.04, Windows 11
