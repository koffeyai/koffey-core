name: Feature request
description: Suggest an improvement to the product, developer experience, or documentation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow or pain point is missing today?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: I’d like the project to ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, mockups, or prior art.
