name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check function drift
        run: bash scripts/check-function-drift.sh

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Contract tests
        run: npm run test:contracts

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Onboarding smoke test
        run: npm run test:smoke

      - name: Build
        run: npm run build
