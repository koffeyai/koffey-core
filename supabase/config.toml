project_id = "your-supabase-project-id"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Configure site_url to your deployed frontend URL in production.
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your code is {{ .Code }} ."

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.external.apple]
enabled = false
client_id = ""
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
redirect_uri = ""
url = ""

# ===== EDGE FUNCTIONS SECURITY CONFIGURATION =====
# SECURITY: Gateway JWT verification is enabled by default. Only pre-auth,
# webhook, and OAuth callback entry points remain public, and those functions
# must validate their own invite code, HMAC/signature, state, or provider token.

# Protected application functions
[functions.unified-chat]
verify_jwt = true

[functions.crm-operations]
verify_jwt = true

[functions.conversation-logger]
verify_jwt = true

[functions.grounded-validator]
verify_jwt = true

[functions.web-enrichment-orchestrator]
verify_jwt = true

[functions.database-search]
verify_jwt = true

[functions.enrich-website]
verify_jwt = true

[functions.generate-analytics-artifact]
verify_jwt = true


# Auth and organization management
# Public pre-auth routing. Rate-limited and limited to low-sensitivity checks.
[functions.handle-auth]
verify_jwt = false

[functions.create-org-with-user]
verify_jwt = true

[functions.create-org-invitation]
verify_jwt = true

[functions.accept-invite]
